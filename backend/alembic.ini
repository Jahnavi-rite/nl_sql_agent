# Alembic configuration — NL SQL Agent

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
# URL is overridden by env.py from app.core.config; this is a fallback.
sqlalchemy.url = postgresql+asyncpg://nlsql:nlsql_dev_password@127.0.0.1:5432/nlsql_agent

[post_write_hooks]
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
