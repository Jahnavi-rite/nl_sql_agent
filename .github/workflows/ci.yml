# =============================================================================
# GitHub Actions CI — NL SQL Agent
# =============================================================================
# Runs on every push and pull request to main/develop branches.
# Checks: lint, type-check, and test for both backend and frontend.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Python lint, typecheck, test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Type-check with mypy
        run: uv run mypy app/
        continue-on-error: true  # Non-blocking in Phase 0

      - name: Run tests
        run: uv run pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript lint, typecheck
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # Non-blocking in Phase 0

      - name: Type-check
        run: npm run typecheck
        continue-on-error: true  # Non-blocking in Phase 0

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
